<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Check</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.5s ease;
            color: white;
            overflow: hidden;
        }

        #container {
            text-align: center;
            z-index: 10;
        }

        .neon-button {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #00f2ff;
            background: transparent;
            border: 2px solid #00f2ff;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            transition: 0.3s;
            box-shadow: 0 0 15px #00f2ff, inset 0 0 15px #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
        }

        .neon-button:hover {
            background: #00f2ff;
            color: #0a0a0a;
            box-shadow: 0 0 50px #00f2ff, 0 0 100px #00f2ff;
        }

        .neon-button:active {
            transform: scale(0.95);
        }

        #status-message {
            margin-top: 30px;
            font-size: 20px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #28a745;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }

        .success-text {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            padding: 20px;
        }

        .error-text {
            color: #ff4d4d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="container">
        <button id="checkButton" class="neon-button">Проверить связь с Supabase</button>
        <div id="status-message"></div>
    </div>

    <div id="successOverlay" class="success-overlay">
        <div class="success-text">СВЯЗЬ С БАЗОЙ УСТАНОВЛЕНА И РАБОТАЕТ ИДЕАЛЬНО!</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://skfwetyjjfihoajdybsm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrZndldHlqamZpaG9hamR5YnNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTI1MDEsImV4cCI6MjA4OTY2ODUwMX0.nfIcRPm7opztjI_4rMY_T5lMeBo3TaBqPaqxPEAllt4';

        const btn = document.getElementById('checkButton');
        const statusMsg = document.getElementById('status-message');
        const successOverlay = document.getElementById('successOverlay');

        btn.addEventListener('click', async () => {
            statusMsg.innerHTML = 'Проверка...';
            statusMsg.className = '';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (response.ok) {
                    successOverlay.style.display = 'flex';
                    document.body.style.backgroundColor = '#28a745';
                } else {
                    const errorData = await response.json().catch(() => ({ message: response.statusText }));
                    throw new Error(`Ошибка ${response.status}: ${errorData.message || response.statusText}`);
                }
            } catch (error) {
                statusMsg.innerHTML = `<span class="error-text">Ошибка: ${error.message}</span>`;
                console.error('Supabase connection error:', error);
            }
        });
    </script>
</body>
</html>
